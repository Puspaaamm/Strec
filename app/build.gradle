plugins {
    id 'com.android.application'
}

android {
    namespace 'com.strec.stream'
    compileSdk 34

    defaultConfig {
        applicationId "com.strec.stream"
        minSdk 26 // Android 8.0 Oreo Target for MediaProjection Foreground Pipeline
        targetSdk 34
        versionCode 1
        versionName "1.0.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    
    // Core Low-Latency Video Pipeline Encoder Engine Engine Framework
    implementation 'com.github.pedroSG94.RootEncoder:rtmp:2.4.3'
}
